<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalon Studio — Web Testing Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #4fffb0;
    --accent2: #00c8ff;
    --accent3: #ff5f87;
    --text: #e8eaf2;
    --muted: #6b7280;
    --correct: #4fffb0;
    --wrong: #ff5f87;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }
  .header .badge {
    display: inline-block;
    background: rgba(79,255,176,0.1);
    border: 1px solid rgba(79,255,176,0.3);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: var(--font-mono);
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 12px;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Progress ── */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Category pill ── */
  .category-pill {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    margin-bottom: 14px;
  }

  /* ── Question card ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.4s ease both;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 16px 16px 0 0;
  }
  .question-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 28px;
  }

  /* ── Options ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    text-align: left;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .option:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(0,200,255,0.05);
    transform: translateX(4px);
  }
  .option .opt-letter {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .option.correct {
    border-color: var(--correct);
    background: rgba(79,255,176,0.08);
    animation: pulse-correct 0.4s ease;
  }
  .option.correct .opt-letter {
    background: var(--correct);
    color: #000;
    border-color: var(--correct);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,95,135,0.08);
    animation: shake 0.4s ease;
  }
  .option.wrong .opt-letter {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
  }
  .option.disabled { cursor: default; opacity: 0.55; }
  .option.correct.disabled, .option.wrong.disabled { opacity: 1; }

  /* ── Feedback ── */
  .feedback {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    border-left: 3px solid;
  }
  .feedback.show { display: block; animation: fadeIn 0.3s ease; }
  .feedback.correct {
    background: rgba(79,255,176,0.07);
    border-color: var(--correct);
    color: #a7ffe0;
  }
  .feedback.wrong {
    background: rgba(255,95,135,0.07);
    border-color: var(--wrong);
    color: #ffb3c6;
  }
  .feedback strong { font-weight: 600; display: block; margin-bottom: 4px; }

  /* ── Nav ── */
  .nav {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
    animation: fadeIn 0.3s ease;
  }
  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: none;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn.show { display: block; }
  .btn.secondary {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    margin-right: 12px;
  }

  /* ── Score screen ── */
  #score-screen {
    display: none;
    text-align: center;
    animation: slideUp 0.5s ease both;
  }
  #score-screen.show { display: block; }
  .score-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 32px;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill {
    fill: none;
    stroke: url(#scoreGrad);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
  }
  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-num {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .score-denom { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .score-title {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .score-sub { color: var(--muted); font-size: 15px; margin-bottom: 40px; line-height: 1.6; }

  /* ── Results breakdown ── */
  .breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 32px;
    text-align: left;
  }
  .breakdown-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .breakdown-row {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 13px;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .breakdown-q { color: var(--text); line-height: 1.4; font-size: 13px; }
  .breakdown-a { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .breakdown-a.correct { color: var(--correct); }
  .breakdown-a.wrong { color: var(--wrong); }

  .restart-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px 40px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .restart-btn:hover { opacity: 0.88; transform: translateY(-2px); }

  /* ── Category stats ── */
  .cat-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .cat-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: left;
  }
  .cat-stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  .cat-stat-score {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .cat-stat-bar {
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }
  .cat-stat-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1) 0.5s;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse-correct {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Streak banner */
  .streak {
    display: none;
    background: rgba(79,255,176,0.1);
    border: 1px solid rgba(79,255,176,0.25);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  .streak.show { display: block; }

  @media (max-width: 520px) {
    .question-card { padding: 24px 20px; }
    .question-text { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="badge">Professional Training</div>
    <h1>Katalon Studio<br><span>Web &amp; API Testing</span></h1>
    <p>Test your knowledge of Katalon Studio concepts, configurations, and best practices.</p>
  </div>

  <!-- Quiz Area -->
  <div id="quiz-area">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 25</div>
    </div>

    <div class="streak" id="streak-banner"></div>

    <div class="question-card" id="question-card">
      <div class="category-pill" id="q-category"></div>
      <div class="question-num" id="q-num"></div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="nav">
      <button class="btn" id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <!-- Score Screen -->
  <div id="score-screen">
    <div class="score-ring">
      <svg viewBox="0 0 160 160" width="160" height="160">
        <defs>
          <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4fffb0"/>
            <stop offset="100%" stop-color="#00c8ff"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="80" cy="80" r="70"/>
        <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="70"/>
      </svg>
      <div class="score-center">
        <div class="score-num" id="score-num">0</div>
        <div class="score-denom" id="score-denom">/ 25</div>
      </div>
    </div>

    <div class="score-title" id="score-title"></div>
    <div class="score-sub" id="score-sub"></div>

    <div class="cat-stats" id="cat-stats"></div>

    <div class="breakdown">
      <div class="breakdown-header">Question Review</div>
      <div id="breakdown-rows"></div>
    </div>

    <button class="restart-btn" onclick="restartQuiz()">↺ Retake Quiz</button>
  </div>

</div>

<script>
const QUESTIONS = [
  // ── Configuration & Object Identification ──
  {
    category: "Configuration",
    q: "What does the Smart Wait feature in Katalon Studio primarily help with?",
    options: ["Slowing down test execution for debugging", "Handling AJAX-heavy pages without explicit delays", "Setting timeouts for custom keywords", "Configuring browser startup speed"],
    answer: 1,
    explanation: "Smart Wait automatically handles AJAX-heavy pages without explicit delays, preventing flakiness due to dynamic loading. It is configured via Project > Settings > Execution > Default Smart Wait."
  },
  {
    category: "Configuration",
    q: "Where do you enable Self-Healing in Katalon Studio?",
    options: ["Test Suite > Properties", "Project > Settings > Self-Healing", "Tools > Self-Healing Manager", "Run > Execution Options > Self-Healing"],
    answer: 1,
    explanation: "Self-Healing is enabled and configured from Project > Settings > Self-Healing. It automatically recovers from UI changes, reducing maintenance for unstable or evolving UIs."
  },
  {
    category: "Configuration",
    q: "Which integration in Katalon supports centralized analytics, reporting, and execution history?",
    options: ["JIRA Integration", "Azure DevOps Integration", "Katalon TestOps", "Selenium Grid"],
    answer: 2,
    explanation: "Katalon TestOps provides centralized analytics, reporting, and execution history. It is configured via Project > Settings > Katalon Platform."
  },
  {
    category: "Locators",
    q: "Which locator type is recommended as the MOST stable when a unique HTML attribute is available?",
    options: ["XPath", "CSS Selector", "Attributes (id, name, aria-*)", "Image-based matching"],
    answer: 2,
    explanation: "Attributes (id, name, aria-*) are the most stable locator type and are preferred when available. Dynamic or auto-generated IDs should be avoided."
  },
  {
    category: "Locators",
    q: "What is the recommended use case for the Smart Locator type?",
    options: ["Lightweight and fast selections based on CSS styling", "Matching elements visually as a last resort", "Deep nested elements such as Shadow DOM or iFrames", "Elements with stable, unique IDs"],
    answer: 2,
    explanation: "Smart Locator is designed for deep nested elements such as Shadow DOM or iFrames. It is slow but reliable, and is recordable but not editable."
  },
  {
    category: "Locators",
    q: "What is the recommended Self-Healing locator fallback order?",
    options: ["CSS > XPath > Image > Attributes > Smart Locator", "XPath > Smart Locator > Attributes > CSS > Image", "Attributes > XPath > CSS > Image > Smart Locator", "Smart Locator > XPath > CSS > Attributes > Image"],
    answer: 1,
    explanation: "The recommended fallback order for Self-Healing is XPath → Smart Locator → Attributes → CSS → Image, as configured in Project > Settings > Self-Healing > Web UI."
  },
  {
    category: "Locators",
    q: "Which custom attribute do the training materials recommend coordinating with developers to add for robust targeting?",
    options: ["id", "name", "data-test-id", "aria-label"],
    answer: 2,
    explanation: "The training recommends using custom attributes like data-test-id for robust targeting, and coordinating with developers to implement them."
  },

  // ── Test Creation ──
  {
    category: "Test Creation",
    q: "After recording with the Web Recorder, where should captured objects initially be reviewed?",
    options: ["The Object Repository root folder", "A temporary (Temp) folder", "The Test Data folder", "The Keywords folder"],
    answer: 1,
    explanation: "After recording, objects are captured in a Temp folder. Best practice is to review and rename them before moving to relevant repository folders."
  },
  {
    category: "Test Creation",
    q: "What is the primary benefit of Katalon's Studio Assist (AI assistant)?",
    options: ["Automatically runs regression suites on a schedule", "Generates test steps from natural language inputs or requirements", "Connects directly to Jira to import test cases", "Converts recorded tests to Groovy scripts"],
    answer: 1,
    explanation: "Studio Assist is an AI-powered code assistant that generates test cases from natural language inputs, requirements, or test ideas, accelerating test authoring."
  },
  {
    category: "Test Creation",
    q: "In Script Mode, how would you call a built-in keyword to click a web element?",
    options: ["Keywords.click()", "WebUI.click()", "Katalon.clickElement()", "Test.perform('click')"],
    answer: 1,
    explanation: "In Script Mode, built-in web keywords are called with the WebUI prefix, e.g., WebUI.click(). Custom keywords use the format CustomKeywords.'path.to.method'()."
  },
  {
    category: "Test Creation",
    q: "Which of the following is a valid way to import API test objects into Katalon?",
    options: ["From a Postman collection", "From a JUnit XML file", "From a Maven POM file", "From a Selenium IDE export"],
    answer: 0,
    explanation: "Katalon supports importing from Postman collections, as well as Swagger/OpenAPI (YAML/JSON), WADL, WSDL, and SoapUI. JUnit XML, Maven POM, and Selenium IDE exports are not supported import sources."
  },
  {
    category: "Test Creation",
    q: "Which API test creation mode allows you to type your intent in plain English (e.g., 'Call login API and verify status 200') and have Katalon auto-generate code?",
    options: ["Keyword Mode", "Import Mode with AI", "Script Mode with StudioAssist", "Object Spy Mode"],
    answer: 2,
    explanation: "Script Mode with AI (StudioAssist) allows you to type intent in plain English and auto-generate API calls, assertions, and parameter handling."
  },

  // ── Debugging ──
  {
    category: "Debugging",
    q: "In which view is breakpoint-based debugging available in Katalon Studio?",
    options: ["Manual Mode", "Script Mode", "Both Manual and Script Mode", "Debug Panel only"],
    answer: 1,
    explanation: "Breakpoint support is only available in Script Mode. You set breakpoints by clicking in the gutter next to the code line, then start debug mode using the debug icon (🐞)."
  },
  {
    category: "Debugging",
    q: "Which debug control allows you to enter into the logic of a called keyword?",
    options: ["Step Over", "Step Out", "Step Into", "Resume"],
    answer: 2,
    explanation: "Step Into dives into called keywords. Step Over moves to the next line, Step Out exits the current keyword, and Resume continues execution."
  },
  {
    category: "Debugging",
    q: "How does Object Spy differ from Self-Healing for fixing locators?",
    options: ["Object Spy is automated; Self-Healing is manual", "Object Spy is manual locate-and-fix; Self-Healing is smart auto-correction", "Object Spy only works for API objects; Self-Healing is for web only", "They are identical features with different names"],
    answer: 1,
    explanation: "Object Spy is a manual tool to highlight and capture locators, while Self-Healing is an automated mechanism that detects broken locators at runtime and suggests corrections."
  },

  // ── Test Data & Repeatability ──
  {
    category: "Test Data",
    q: "What is the recommended maximum dataset size for Internal Data files to maintain maintainability?",
    options: ["100–200 rows", "50–100 rows", "5–20 rows", "No limit recommended"],
    answer: 2,
    explanation: "The training recommends keeping Internal Data datasets small (5–20 rows) for maintainability. Large regression datasets should use Excel or CSV files instead."
  },
  {
    category: "Test Data",
    q: "Where should Excel/CSV test data files be stored within a Katalon project?",
    options: ["Root of the project directory", "Include > Resources > Test Data", "Test Cases > Data", "Object Repository > Data"],
    answer: 1,
    explanation: "CSV and Excel files should be placed under Include > Resources > Test Data within the project. This keeps data organized and portable, avoiding absolute paths."
  },
  {
    category: "Test Data",
    q: "When binding test data to a test case, which combination strategy executes ALL rows sequentially, each exactly once?",
    options: ["One-to-One", "Range", "All Combinations", "All"],
    answer: 3,
    explanation: "The 'All' combination strategy causes each data row to execute once. 'All Combinations' creates a full matrix, 'One-to-One' maps Row N to Row N, and 'Range' targets specific rows."
  },
  {
    category: "Test Data",
    q: "What is the main purpose of Execution Profiles in Katalon Studio?",
    options: ["To record browser interactions automatically", "To store Global Variables for different environments (Dev, QA, UAT, Prod)", "To package test cases for deployment", "To configure locator strategies per environment"],
    answer: 1,
    explanation: "Profiles allow you to define reusable Global Variables for different environments, decoupling test logic from environment-specific data and enabling scalable execution."
  },
  {
    category: "Test Data",
    q: "How do you reference a Global Variable from an Execution Profile inside a test case?",
    options: ["GlobalVariable.VARIABLE_NAME", "${GlobalVariable.VARIABLE_NAME}", "@GlobalVariable.VARIABLE_NAME", "Profiles.get('VARIABLE_NAME')"],
    answer: 1,
    explanation: "Global Variables are referenced using the syntax ${GlobalVariable.VARIABLE_NAME} within test cases."
  },

  // ── Test Execution ──
  {
    category: "Test Execution",
    q: "What is the key difference between a Test Suite and a Test Suite Collection?",
    options: ["Test Suites support data binding; Test Suite Collections do not", "Test Suite Collections enable parallel execution and cross-browser testing across multiple suites", "Test Suites can run in CLI; Test Suite Collections cannot", "Test Suite Collections are for API tests only"],
    answer: 1,
    explanation: "Test Suite Collections contain multiple Test Suites and enable parallel execution, cross-browser testing, and multi-profile execution — capabilities not available in a single Test Suite."
  },
  {
    category: "Test Execution",
    q: "Where in Katalon Studio do you configure browser-specific capabilities such as args, prefs, and WebDriver capabilities?",
    options: ["Test Suite > Execution Settings", "Project > Settings > Desired Capabilities > Web UI > [Browser Type]", "Tools > WebDriver > Browser Config", "Run > Advanced Options > Capabilities"],
    answer: 1,
    explanation: "Browser capabilities (args, prefs, top-level capabilities) are configured via Project > Settings > Desired Capabilities > Web UI > [Browser Type]."
  },
  {
    category: "Test Execution",
    q: "Which browser argument runs the browser in headless mode for faster execution?",
    options: ["--no-gui", "--disable-display", "--headless", "--silent"],
    answer: 2,
    explanation: "The --headless argument runs the browser in headless mode for faster execution. It is often combined with --disable-gpu for compatibility."
  },
  {
    category: "Test Execution",
    q: "What is required to activate the Katalon Runtime Engine when generating a CLI command?",
    options: ["A valid Katalon license file (.lic)", "A Katalon API key", "A Jenkins integration token", "A TestOps project ID"],
    answer: 1,
    explanation: "When generating a CLI command via the Command Builder, you must enter your Katalon API key, which is required to activate the Runtime Engine for CLI execution."
  },
  {
    category: "Test Execution",
    q: "In a Linux cron job entry '0 2 * * *', when would the Katalon test batch run?",
    options: ["Every 2 minutes", "At 2:00 AM every day", "At 2:00 PM on weekdays", "Every hour at minute 2"],
    answer: 1,
    explanation: "The cron expression '0 2 * * *' means: minute 0, hour 2, every day, every month, every weekday — which translates to 2:00 AM every day."
  }
];

let currentQ = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let streak = 0;
let categoryScores = {};

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

const questions = shuffle(QUESTIONS);

function initCategoryScores() {
  questions.forEach(q => {
    if (!categoryScores[q.category]) categoryScores[q.category] = { correct: 0, total: 0 };
    categoryScores[q.category].total++;
  });
}

function renderQuestion() {
  const q = questions[currentQ];
  answered = false;

  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-num').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  document.getElementById('next-btn').className = 'btn';

  // Update progress
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentQ} / ${questions.length}`;

  // Streak banner
  const sb = document.getElementById('streak-banner');
  if (streak >= 3) {
    sb.textContent = `🔥 ${streak} correct in a row!`;
    sb.className = 'streak show';
  } else {
    sb.className = 'streak';
  }

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s ease both';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const opts = document.querySelectorAll('.option');
  const isCorrect = idx === q.answer;

  opts.forEach((opt, i) => {
    opt.disabled = true;
    opt.classList.add('disabled');
    if (i === q.answer) opt.classList.add('correct');
    if (i === idx && !isCorrect) opt.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    streak++;
    categoryScores[q.category] = categoryScores[q.category] || { correct: 0, total: 0 };
    categoryScores[q.category].correct++;
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ Correct!</strong>${q.explanation}`;
  } else {
    streak = 0;
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ Not quite.</strong>${q.explanation}`;
  }

  userAnswers.push({ q: q.q, yourAnswer: q.options[idx], correctAnswer: q.options[q.answer], correct: isCorrect });

  const nextLabel = currentQ < questions.length - 1 ? 'Next →' : 'See Results';
  const nb = document.getElementById('next-btn');
  nb.textContent = nextLabel;
  nb.className = 'btn show';

  // Update streak banner mid-answer
  const sb = document.getElementById('streak-banner');
  if (streak >= 3) {
    sb.textContent = `🔥 ${streak} correct in a row!`;
    sb.className = 'streak show';
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showScore();
  } else {
    renderQuestion();
  }
}

function showScore() {
  document.getElementById('quiz-area').style.display = 'none';
  const ss = document.getElementById('score-screen');
  ss.className = 'show';

  const pct = score / questions.length;
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-denom').textContent = `/ ${questions.length}`;

  let title, sub;
  if (pct >= 0.9) { title = '🏆 Outstanding!'; sub = 'Excellent mastery of Katalon Studio.'; }
  else if (pct >= 0.75) { title = '✅ Well Done!'; sub = 'Strong understanding with a few areas to review.'; }
  else if (pct >= 0.6) { title = '📘 Good Effort'; sub = 'Solid foundation — revisit the sections below.'; }
  else { title = '🔄 Keep Practicing'; sub = 'Review the training material and retake the quiz.'; }

  document.getElementById('score-title').textContent = title;
  document.getElementById('score-sub').textContent = sub + ` You scored ${score} out of ${questions.length} (${Math.round(pct * 100)}%).`;

  // Animate ring
  const circumference = 440;
  const offset = circumference - (pct * circumference);
  setTimeout(() => {
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
  }, 100);

  // Category stats
  const catEl = document.getElementById('cat-stats');
  catEl.innerHTML = '';
  Object.entries(categoryScores).forEach(([cat, data]) => {
    const p = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
    catEl.innerHTML += `
      <div class="cat-stat">
        <div class="cat-stat-label">${cat}</div>
        <div class="cat-stat-score">${data.correct}/${data.total}</div>
        <div class="cat-stat-bar"><div class="cat-stat-fill" style="width:${p}%"></div></div>
      </div>`;
  });

  // Breakdown
  const brEl = document.getElementById('breakdown-rows');
  brEl.innerHTML = userAnswers.map(a => `
    <div class="breakdown-row">
      <div class="breakdown-icon">${a.correct ? '✅' : '❌'}</div>
      <div>
        <div class="breakdown-q">${a.q}</div>
        ${!a.correct ? `<div class="breakdown-a wrong">Your answer: ${a.yourAnswer}</div>
        <div class="breakdown-a correct">Correct: ${a.correctAnswer}</div>` : `<div class="breakdown-a correct">${a.correctAnswer}</div>`}
      </div>
    </div>`).join('');
}

function restartQuiz() {
  currentQ = 0;
  score = 0;
  answered = false;
  userAnswers = [];
  streak = 0;
  categoryScores = {};

  // Reshuffle
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }

  initCategoryScores();
  document.getElementById('score-screen').className = '';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('ring-fill').style.strokeDashoffset = 440;
  renderQuestion();
}

// Init
initCategoryScores();
renderQuestion();
</script>
